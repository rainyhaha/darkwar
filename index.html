<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[FROM] Information List</title>
<style>
    body {
        font-family: 'Pretendard', 'Malgun Gothic', '맑은 고딕', sans-serif;
        /* 배경을 은은한 사선 그라데이션으로 변경하여 입체감 부여 */
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f2 100%);
        color: #333;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
    }
    
    .container {
        width: 100%;
        max-width: 650px;
    }
    
    h1 {
        text-align: center;
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 40px;
        color: #2c3e50;
        letter-spacing: -0.5px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
    }

    /* 카드 형태의 토글 그룹 스타일 */
    details {
        margin-bottom: 20px;
        background-color: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        /* 부드럽고 고급스러운 그림자 효과 추가 */
        box-shadow: 0 8px 16px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.02);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    details:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 20px rgba(0,0,0,0.06), 0 4px 6px rgba(0,0,0,0.03);
    }

    summary {
        font-size: 18px;
        font-weight: 700;
        padding: 18px 24px;
        cursor: pointer;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
        color: #222;
        letter-spacing: -0.3px;
    }
    
    summary::-webkit-details-marker {
        display: none;
    }

    summary::after {
        content: '▼';
        font-size: 13px;
        opacity: 0.6;
        transition: transform 0.3s ease;
    }
    
    details[open] summary::after {
        transform: rotate(180deg);
    }

    .menu-list {
        margin: 0;
        padding: 0;
        list-style: none;
        background-color: #fff;
    }
    
    .menu-list li {
        border-top: 1px solid #f0f0f0;
    }
    
    .menu-list a {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        text-decoration: none;
        color: #444;
        transition: all 0.2s ease;
    }

    /* 좌측 영역 (배지 + 타이틀) 정렬 */
    .item-content {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    /* 넘버링 배지 디자인 추가 */
    .item-badge {
        display: inline-block;
        background-color: #f0f2f5;
        color: #666;
        font-size: 13px;
        font-weight: 700;
        padding: 4px 12px;
        border-radius: 20px;
        transition: all 0.2s ease;
    }

    .item-title {
        font-size: 16px;
        font-weight: 500;
    }

    .menu-list a::after {
        content: '➔';
        font-size: 15px;
        color: #bbb;
        transition: transform 0.2s ease, color 0.2s ease;
    }
    
    /* 호버(Hover) 시 디자인 변화 */
    .menu-list a:hover {
        background-color: #fafbfe;
        color: #000;
    }

    .menu-list a:hover .item-title {
        font-weight: 700;
    }

    /* 호버 시 배지 색상도 브랜드 컬러로 변경 */
    .menu-list a:hover .item-badge {
        background-color: #007bff;
        color: #fff;
    }

    .menu-list a:hover::after {
        transform: translateX(5px);
        color: #007bff;
    }

    /* 모바일 반응형 */
    @media (max-width: 480px) {
        h1 { font-size: 24px; margin-bottom: 30px; }
        summary { font-size: 16px; padding: 16px 20px; }
        .menu-list a { padding: 14px 20px; }
        .item-title { font-size: 15px; }
        .item-badge { font-size: 12px; padding: 3px 10px; }
    }
</style>
</head>
<body>

<div class="container">
    <h1>📚 [FROM] Information List</h1>
    <div id="accordion-container"></div>
</div>

<script>
    // 파스텔 톤 무지개 색상 배열
    const rainbowColors = [
        '#ffadad', // 빨
        '#ffd6a5', // 주
        '#fdffb6', // 노
        '#caffbf', // 초
        '#9bf6ff', // 파
        '#a0c4ff', // 남
        '#bdb2ff'  // 보
    ];

    // 그룹 및 링크 데이터 설정
    const guideData = [
        {
            groupTitle: "Rules",
            links: [
                { title: "Seating Chart", url: "https://rainyhaha.github.io/darkwar/rules/seatingChart.html" }
            ]
        },
        {
            groupTitle: "Tips",
            links: [
                { title: "Pet Agent Guide", url: "https://rainyhaha.github.io/darkwar/tips/petAgentGuide.html" }
            ]
        }
    ];

    const container = document.getElementById('accordion-container');

    // 데이터 기반 화면 렌더링
    guideData.forEach((group, groupIndex) => {
        const details = document.createElement('details');
        details.open = true;

        const summary = document.createElement('summary');
        summary.textContent = group.groupTitle;
        // 무지개색 순환 적용
        summary.style.backgroundColor = rainbowColors[groupIndex % rainbowColors.length];
        details.appendChild(summary);

        const ul = document.createElement('ul');
        ul.className = 'menu-list';

        group.links.forEach((linkItem, itemIndex) => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            
            a.href = linkItem.url;
            
            const prefix = group.groupTitle.endsWith('s') 
                ? group.groupTitle.slice(0, -1) 
                : group.groupTitle;
            
            // 배지와 텍스트를 담을 래퍼 요소 생성
            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'item-content';

            // 동그란 배지(Badge) 요소 생성
            const badge = document.createElement('span');
            badge.className = 'item-badge';
            badge.textContent = `${prefix} ${itemIndex + 1}`;

            // 메뉴 텍스트 요소 생성
            const titleSpan = document.createElement('span');
            titleSpan.className = 'item-title';
            titleSpan.textContent = linkItem.title;

            // 래퍼에 배지와 텍스트 추가 후 링크(a)에 조립
            contentWrapper.appendChild(badge);
            contentWrapper.appendChild(titleSpan);
            a.appendChild(contentWrapper);
            
            li.appendChild(a);
            ul.appendChild(li);
        });

        details.appendChild(ul);
        container.appendChild(details);
    });
</script>

</body>
</html>
