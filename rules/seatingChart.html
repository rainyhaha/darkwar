<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[FROM] Seating Chart</title>
<style>
    /* 첫 번째 코드의 글꼴 스타일을 body에 적용 */
    body {
        font-family: 'Pretendard', 'Malgun Gothic', '맑은 고딕', sans-serif;
        color: #333; /* 글씨가 너무 까맣지 않도록 부드러운 색상 추가 */
    }

    h1 {
        text-align: center;
        margin-bottom: 5px;
    }
    
    .version-text {
        text-align: center; 
        font-size: 14px;
        font-weight: 600;
        color: #007bff;
        margin: 0 0 16px 0;
        letter-spacing: 0.5px;
    }

    .notice-wrapper {
        text-align: center;
        margin-bottom: 25px;
    }
    
    .notice-text {
        display: inline-block;
        font-size: 18px;
        color: #d93025;
        font-weight: 800;
        background-color: #fce8e6;
        padding: 10px 20px;
        border-radius: 8px;
        margin: 0;
        box-shadow: 0 2px 4px rgba(217, 48, 37, 0.15);
    }

    img {
        display: block;
        margin: 0 auto;
        max-width: 100%;
    }
    
    .button-container {
        text-align: center;
        margin-bottom: 20px;
    }

    .download-btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: #007bff;
        color: #ffffff;
        text-decoration: none;
        font-weight: bold;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: background-color 0.2s, transform 0.2s;
    }

    .download-btn:hover {
        background-color: #0056b3;
        transform: translateY(-2px);
    }
</style>
</head>
<body>
    <h1>[FROM] Seating Chart</h1>
    
    <p class="version-text" id="version-text"></p>
    
    <div class="notice-wrapper">
        <p class="notice-text">🚨 Seating arrangements will begin in Season 3(June 8, 2026)</p>
    </div>
    
    <div class="button-container">
        <a href="https://rainyhaha.github.io/darkwar/images/rules/seatingChart.png" id="download-btn" class="download-btn">
            💾 Save Image
        </a>
    </div>

    <img src="https://rainyhaha.github.io/darkwar/images/rules/seatingChart.png" alt="Seating Chart">

    <script>
        const sysdate = "20260601";

        // YYYYMMDD 형식을 영문 날짜 포맷으로 변환하는 함수
        const formatToEnglishDate = (dateString) => {
            if (!dateString || dateString.length !== 8) return dateString;
            
            const year = dateString.substring(0, 4);
            const monthIndex = parseInt(dateString.substring(4, 6), 10) - 1;
            const day = parseInt(dateString.substring(6, 8), 10); 
            
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            if (monthIndex < 0 || monthIndex > 11) return dateString; 
            
            return `${months[monthIndex]} ${day}, ${year}`;
        };

        // 1. 상단 version-text 에 변환된 영문 날짜 적용
        document.getElementById('version-text').textContent = `Last Updated: ${formatToEnglishDate(sysdate)}`;

        // 2. 다운로드 버튼의 파일명(download 속성)을 sysdate에 맞춰 동적 할당
        document.getElementById('download-btn').setAttribute("download", `SeatingChart_${sysdate}.png`);
    </script>
</body>
</html>
