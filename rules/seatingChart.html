<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[FROM] Seating Chart</title>
<style>
    /* 첫 번째 코드의 글꼴 스타일을 body에 적용 */
    body {
        font-family: 'Pretendard', 'Malgun Gothic', '맑은 고딕', sans-serif;
        color: #333; /* 글씨가 너무 까맣지 않도록 부드러운 색상 추가 */
    }

    h1 {
        text-align: center;
        margin-bottom: 5px;
    }
    
    .version-text {
        text-align: center; 
        font-size: 14px;
        font-weight: 600;
        color: #007bff;
        margin: 0 0 16px 0;
        letter-spacing: 0.5px;
    }

    .notice-wrapper {
        text-align: center;
        margin-bottom: 25px;
    }
    
    .notice-text {
        display: inline-block;
        font-size: 18px;
        color: #d93025;
        font-weight: 800;
        background-color: #fce8e6;
        padding: 10px 20px;
        border-radius: 8px;
        margin: 0;
        box-shadow: 0 2px 4px rgba(217, 48, 37, 0.15);
    }

    img {
        display: block;
        margin: 0 auto;
        max-width: 100%;
    }
    
    .button-container {
        text-align: center;
        margin-bottom: 20px;
    }

    .download-btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: #007bff;
        color: #ffffff;
        text-decoration: none;
        font-weight: bold;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: background-color 0.2s, transform 0.2s;
    }

    .download-btn:hover {
        background-color: #0056b3;
        transform: translateY(-2px);
    }
</style>
</head>
<body>
    <h1>[FROM] Seating Chart</h1>
    
    <p class="version-text">May 31, 2026 Version</p>
    
    <div class="notice-wrapper">
        <p class="notice-text">🚨 Seating arrangements will begin in Season 3</p>
    </div>
    
    <div class="button-container">
        <a href="https://rainyhaha.github.io/darkwar/images/rules/seatingChart.png" download="SeatingChart_20260531.png" class="download-btn">
            💾 Save Image
        </a>
    </div>

    <img src="https://rainyhaha.github.io/darkwar/images/rules/seatingChart.png" alt="Seating Chart">
</body>
</html>
